name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  RUST_VERSION: "1.96.0"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/cargo-zigbuild@sha256:dce4ea213244423439d97a2070031c6ea287fc32f01b0aaa38f8b4d46f52e68c
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: conpub-x86_64-linux
          - target: aarch64-unknown-linux-musl
            asset: conpub-aarch64-linux
          - target: x86_64-apple-darwin
            asset: conpub-x86_64-macos
          - target: aarch64-apple-darwin
            asset: conpub-aarch64-macos
          - target: x86_64-pc-windows-gnu
            asset: conpub-x86_64-windows.exe
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain + target
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config zip
          rustup set profile minimal
          rustup toolchain install "${RUST_VERSION}" --profile minimal --no-self-update
          rustup target add --toolchain "${RUST_VERSION}" "${{ matrix.target }}"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zigbuild-${{ matrix.target }}
      - name: Build
        run: cargo +${RUST_VERSION} zigbuild --locked --release --target ${{ matrix.target }}
      - name: Package + checksum
        run: |
          set -euo pipefail
          archive="conpub-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$archive"
          case "${{ matrix.target }}" in
            *windows*)
              cp "target/${{ matrix.target }}/release/conpub.exe" "${{ matrix.asset }}"
              cp "target/${{ matrix.target }}/release/conpub.exe" "$archive/conpub.exe"
              zip -qr "${archive}.zip" "$archive"
              sha256sum "${archive}.zip" > "${archive}.zip.sha256"
              ;;
            *)
              cp "target/${{ matrix.target }}/release/conpub" "${{ matrix.asset }}"
              chmod +x "${{ matrix.asset }}"
              cp "target/${{ matrix.target }}/release/conpub" "$archive/conpub"
              chmod +x "$archive/conpub"
              tar -czf "${archive}.tar.gz" "$archive"
              sha256sum "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
              ;;
          esac
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
            conpub-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: dist/*
          body: |
            ## Direct downloads

            Prebuilt `conpub` binaries and `.sha256` checksums are attached
            for Linux x86_64/aarch64 musl, macOS x86_64/aarch64, and Windows
            x86_64 GNU.

            macOS binaries are unsigned. On first run, right-click the
            downloaded file and select Open to bypass Gatekeeper, or run:

            ```bash
            xattr -d com.apple.quarantine conpub-*-macos
            ```
